<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | e-RepCard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="auth-config.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,sans-serif;
  background:#eef4ff;
  padding:20px;
  color:#172033;
}
.dashboard-container{max-width:1250px;margin:0 auto}
.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  margin-bottom:18px;
  background:#003c8f;
  color:white;
  padding:18px 22px;
  border-radius:14px;
}
.logo-area h1{font-size:24px;margin-bottom:4px}
.logo-area p{font-size:13px;color:#dbeafe}
.admin-info{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.admin-name{
  background:white;
  color:#003c8f;
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:bold;
}
.logout-btn{
  background:#dc3545;
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:999px;
  cursor:pointer;
  font-weight:bold;
}
.filter-section{
  background:white;
  padding:12px 14px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
  box-shadow:0 3px 12px rgba(15,23,42,.06);
}
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap}
.filter-tab{
  border:1px solid #dbe3ef;
  background:white;
  color:#475569;
  padding:7px 13px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
}
.filter-tab.active{
  background:#003c8f;
  color:white;
  border-color:#003c8f;
}
.search-box{display:flex;gap:8px;align-items:center}
.search-box input{
  width:260px;
  max-width:100%;
  padding:9px 12px;
  border:1px solid #dbe3ef;
  border-radius:999px;
  outline:none;
}
.search-box button{
  background:#003c8f;
  color:white;
  border:none;
  padding:9px 15px;
  border-radius:999px;
  cursor:pointer;
  font-weight:bold;
}
.applications-table{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 3px 12px rgba(15,23,42,.06);
}
.result-info{
  padding:12px 15px;
  font-size:13px;
  color:#64748b;
  border-bottom:1px solid #e5e7eb;
  background:#f8fafc;
}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse;min-width:850px}
th{
  background:#f8fafc;
  padding:13px 12px;
  text-align:left;
  color:#003c8f;
  font-size:12px;
  text-transform:uppercase;
  border-bottom:1px solid #e5e7eb;
}
td{
  padding:13px 12px;
  border-bottom:1px solid #eef2f6;
  font-size:13px;
  vertical-align:middle;
}
tr:hover{background:#f8fbff}
.photo-thumb{
  width:42px;
  height:42px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid #dbe3ef;
}
.status{
  display:inline-block;
  padding:5px 11px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
}
.status.pending{background:#fff7ed;color:#c2410c}
.status.approved{background:#ecfdf5;color:#047857}
.status.rejected{background:#fef2f2;color:#b91c1c}
.btn{
  border:none;
  border-radius:7px;
  padding:7px 12px;
  cursor:pointer;
  font-size:12px;
  font-weight:bold;
}
.btn-blue{background:#003c8f;color:white}
.btn-green{background:#16a34a;color:white}
.btn-red{background:#dc2626;color:white}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.empty-state{text-align:center;padding:40px;color:#64748b}

/* Modal */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  z-index:9999;
  align-items:center;
  justify-content:center;
  padding:15px;
}
.modal-content{
  background:white;
  width:min(920px,100%);
  max-height:90vh;
  overflow:auto;
  border-radius:16px;
}
.modal-header{
  background:#003c8f;
  color:white;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:5;
}
.modal-header h2{font-size:18px}
.modal-close{
  background:rgba(255,255,255,.18);
  color:white;
  border:none;
  width:32px;
  height:32px;
  border-radius:50%;
  font-size:20px;
  cursor:pointer;
}
.modal-body{padding:20px}

@media(max-width:768px){
  body{padding:10px}
  .header-top{display:block;text-align:center}
  .admin-info{justify-content:center;margin-top:12px}
  .filter-section{display:block}
  .filter-tabs{margin-bottom:10px}
  .search-box input{width:100%}
}
</style>
</head>

<body>
<div class="dashboard-container">

  <div class="header-top">
    <div class="logo-area">
      <h1>e-RepCard Admin</h1>
      <p>Authorization Management System</p>
    </div>
    <div class="admin-info">
      <span class="admin-name" id="adminEmail">Administrator</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('active', this)">Active <span id="activeCount">0</span></button>
      <button class="filter-tab" onclick="setFilter('pending', this)">Pending <span id="pendingCount">0</span></button>
      <button class="filter-tab" onclick="setFilter('approved', this)">Approved <span id="approvedCount">0</span></button>
      <button class="filter-tab" onclick="setFilter('rejected', this)">Rejected <span id="rejectedCount">0</span></button>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search application...">
      <button onclick="renderTable()">Search</button>
    </div>
  </div>

  <div class="applications-table">
    <div class="result-info" id="resultInfo">Loading applications...</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Photo</th>
            <th>Employer</th>
            <th>Representative</th>
            <th>SS Number</th>
            <th>Email</th>
            <th>Status</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="adminBody">
          <tr><td colspan="8">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div id="detailsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Application Details</h2>
      <button class="modal-close" onclick="closeDetails()">×</button>
    </div>
    <div class="modal-body" id="detailsBody"></div>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
