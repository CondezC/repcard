<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application View | e-RepCard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="auth-config.js"></script>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background: #eaf1ff;
  padding: 22px;
  color: #0f172a;
}

.summary-page {
  max-width: 980px;
  margin: 0 auto;
}

.summary-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.summary-btn {
  border: none;
  border-radius: 999px;
  padding: 10px 18px;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.summary-btn-blue {
  background: #003c8f;
  color: white;
}

.summary-btn-gray {
  background: #64748b;
  color: white;
}

.summary-loading,
.summary-error {
  background: white;
  border-radius: 18px;
  padding: 28px;
  text-align: center;
  box-shadow: 0 8px 25px rgba(15,23,42,.08);
}

.summary-error {
  color: #b91c1c;
}

.summary-card {
  background: white;
  border: 2px solid #003c8f;
  border-radius: 12px;
  padding: 24px;
  box-shadow: 0 12px 35px rgba(0,60,143,.12);
}

.summary-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid #003c8f;
  flex-wrap: wrap;
}

.summary-logo img {
  width: 85px;
  height: 70px;
  object-fit: contain;
}

.summary-sss h1 {
  font-size: 20px;
  color: #003c8f;
  margin-bottom: 5px;
}

.summary-branch {
  font-size: 14px;
  font-weight: bold;
  color: #555;
  margin: 3px 0;
}

.summary-address,
.summary-tel {
  font-size: 12px;
  color: #555;
}

.summary-title {
  text-align: center;
  color: #003c8f;
  margin: 18px 0;
  font-size: 16px;
  font-weight: 800;
}

.summary-info-box {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 170px;
  gap: 22px;
  border: 1px solid #003c8f;
  padding: 16px;
  margin-bottom: 18px;
  align-items: center;
}

.summary-info-table {
  width: 100%;
  border-collapse: collapse;
}

.summary-info-table td {
  border: 1px solid #003c8f;
  padding: 11px 10px;
  font-size: 14px;
  vertical-align: middle;
}

.summary-info-table td:first-child {
  font-weight: 800;
  color: #003c8f;
  width: 190px;
  background: #f8fbff;
  text-align: right;
}

.summary-info-table td:last-child {
  text-align: center;
}

.summary-photo-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  width: 150px;
  margin: 0 auto;
}

.summary-photo-label {
  font-weight: 800;
  color: #003c8f;
  margin-bottom: 8px;
  font-size: 16px;
  text-align: center;
  line-height: 1.1;
}

.summary-photo-frame {
  width: 130px;
  height: 130px;
  border: 2px solid #003c8f;
  border-radius: 8px;
  overflow: hidden;
  background: #f8fafc;
  display: flex;
  align-items: center;
  justify-content: center;
}

.summary-photo-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.summary-no-photo {
  font-size: 12px;
  color: #64748b;
  text-align: center;
}

.summary-auth-text {
  font-size: 13px;
  line-height: 1.55;
  text-align: justify;
  margin: 16px 0;
}

.summary-signature-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 20px 0;
}

.summary-signature-card {
  text-align: center;
  border: 1px solid #dbe3ef;
  border-radius: 14px;
  background: #f8fbff;
  padding: 16px;
}

.summary-signature-title {
  background: #003c8f;
  color: white;
  border-radius: 999px;
  padding: 8px;
  font-weight: 800;
  margin-bottom: 12px;
}

.summary-signature-frame {
  width: 100%;
  height: 105px;
  background: white;
  border: 1px solid #003c8f;
  border-radius: 8px;
  padding: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.summary-signature-frame img {
  max-width: 100%;
  max-height: 90px;
  object-fit: contain;
}

.summary-signature-name {
  margin-top: 10px;
  font-weight: 700;
  color: #003c8f;
  min-height: 20px;
}

.summary-noted {
  margin-top: 24px;
  color: #003c8f;
  font-weight: 700;
}

.summary-noted-line {
  width: 260px;
  border-bottom: 1px solid #0f172a;
  margin: 28px 0 6px;
}

.summary-noted-name {
  color: #0f172a;
  font-weight: 400;
  font-size: 16px;
}

.summary-noted-title {
  color: #0f172a;
  font-weight: 400;
}

.summary-footer-status {
  margin-top: 10px;
  text-align: center;
  background: transparent;
  padding: 5px 0;
}

.summary-status {
  display: inline-block;
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 800;
}

.summary-status.pending {
  background: #fff7ed;
  color: #c2410c;
}

.summary-status.approved {
  background: transparent;
  color: #047857;
  font-weight: bold;
}

.summary-status.rejected {
  background: #fef2f2;
  color: #b91c1c;
}

.system-note {
  margin-top: 1px;
  font-size: 11px;
  color: #333;
  text-align: center;
}

@media print {
  body {
    background: white;
    padding: 0;
  }

  .summary-actions {
    display: none;
  }

  .summary-page {
    max-width: 100%;
  }

  .summary-card {
    box-shadow: none;
    border-radius: 0;
  }
}

@media (max-width: 768px) {
  body {
    padding: 10px;
  }

  .summary-card {
    padding: 14px;
  }

  .summary-info-box {
    grid-template-columns: 1fr;
  }

  .summary-info-table td {
    display: block;
    width: 100%;
    text-align: left !important;
  }

  .summary-info-table td:first-child {
    width: 100%;
  }

  .summary-photo-card {
    width: 100%;
  }

  .summary-photo-frame {
    width: 110px;
    height: 110px;
  }

  .summary-signature-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
<div class="summary-page">
  <div class="summary-actions">
    <button class="summary-btn summary-btn-gray" onclick="goBack()">← Back</button>
    <button class="summary-btn summary-btn-blue" onclick="window.print()">Print</button>
  </div>

  <div id="summaryContainer" class="summary-loading">
    Loading application...
  </div>
</div>

<script>
const dbSummary = firebase.firestore();

firebase.auth().onAuthStateChanged(function(user) {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  displaySummary(user);
});

  function goBack() {
    window.location.href = "my-submissions.html";
  }

async function displaySummary(user) {
  const container = document.getElementById("summaryContainer");
  const id = new URLSearchParams(window.location.search).get("id");

  if (!id) {
    container.className = "summary-error";
    container.innerHTML = "No application ID found.";
    return;
  }

  try {
    const doc = await dbSummary.collection("sss-submissions").doc(id).get();

    if (!doc.exists) {
      container.className = "summary-error";
      container.innerHTML = "Application not found.";
      return;
    }

    const data = doc.data();
    const status = (data.status || "pending").toLowerCase();

    container.className = "summary-card";

    container.innerHTML = `
      <div class="summary-header">
        <div class="summary-logo">
          <img src="republic-of-the-philippines-social-security-system-logo-png_seeklogo.png" alt="SSS Logo">
        </div>

        <div class="summary-sss">
          <h1>Social Security System</h1>
          <div class="summary-branch">EASTWOOD BRANCH</div>
          <div class="summary-address">187 ABQ Building, E. Rodriguez Jr. Ave., Bagumbayan, QC</div>
          <div class="summary-tel">Tel. Nos.: 8351-1605; 8351-1623</div>
        </div>
      </div>

      <div class="summary-title">
        COMPANY REPRESENTATIVE AUTHORIZATION CARD
      </div>

      <div class="summary-info-box">
        <table class="summary-info-table">
          <tr>
            <td>EMPLOYER NAME:</td>
            <td>${escapeHtml(data.employerName || "N/A")}</td>
          </tr>
          <tr>
            <td>EMPLOYER ID NO.:</td>
            <td>${escapeHtml(data.employerId || "N/A")}</td>
          </tr>
          <tr>
            <td>ADDRESS:</td>
            <td>${escapeHtml(data.address || "N/A")}</td>
          </tr>
          <tr>
            <td>TELEPHONE NO.:</td>
            <td>${escapeHtml(data.telephone || "N/A")}</td>
          </tr>
        </table>

        <div class="summary-photo-card">
          <div class="summary-photo-label">PHOTO<br>1x1</div>
          <div class="summary-photo-frame">
            ${
              data.photo
                ? `<img src="${data.photo}" alt="Photo 1x1">`
                : `<div class="summary-no-photo">No photo</div>`
            }
          </div>
        </div>
      </div>

      <div class="summary-auth-text">
        This is to certify that Mr./Ms.
        <b>${escapeHtml(data.certName || "N/A")}</b>
        with SS #
        <b>${escapeHtml(data.ssNumber || "N/A")}</b>,
        whose specimen signatures / initials appear below, is authorized to transact, verify and file
        Employer Data Change Request (R-8), Employer Registration Form (R-1),
        Employment Report (R-1A) and Member Data Change Request (E-4)
        of herein company's employees.
        <br><br>
        This Certification shall be valid within one (1) year from the date of issuance
        unless otherwise revoked and the SSS Eastwood Branch duly notified.
      </div>

      <div class="summary-signature-grid">
        <div class="summary-signature-card">
          <div class="summary-signature-title">Specimen Signature</div>
          <div class="summary-signature-frame">
            ${
              data.specimenSignature1
                ? `<img src="${data.specimenSignature1}" alt="Specimen Signature">`
                : `<div class="summary-no-photo">No signature</div>`
            }
          </div>
          <div class="summary-signature-name">
            ${escapeHtml(data.specimenName1 || data.certName || "")}
          </div>
        </div>

        <div class="summary-signature-card">
          <div class="summary-signature-title">Signature Over Printed Name of Employer/Owner</div>
          <div class="summary-signature-frame">
            ${
              data.employerSignature
                ? `<img src="${data.employerSignature}" alt="Employer Signature">`
                : `<div class="summary-no-photo">No signature</div>`
            }
          </div>
          <div class="summary-signature-name">
            ${escapeHtml(data.employerName2 || "")}
          </div>
        </div>
      </div>

      <div class="summary-noted">
        Noted by:
        <div class="summary-noted-line"></div>
        <div class="summary-noted-name">ELEANOR F. DEATO</div>
        <div class="summary-noted-title">Branch Head</div>
      </div>

      <div class="summary-footer-status">
        <span class="summary-status ${status}">
          ${status.toUpperCase()}
        </span>

        ${
          data.rejectionReason
            ? `<div style="margin-top:10px;color:#b91c1c;">
                <b>Reason:</b> ${escapeHtml(data.rejectionReason)}
               </div>`
            : ""
        }
      </div>

      ${
        status === "approved"
          ? `
            <div class="system-note">
                 This is a system generated document. No signature required.
            </div>
          `
          : ""
      }
    `;

  } catch (error) {
    console.error("Summary error:", error);
    container.className = "summary-error";
    container.innerHTML = "Failed to load application: " + escapeHtml(error.message);
  }
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>
</body>
</html>
