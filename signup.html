<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register | e-RepCard</title>

<link rel="stylesheet" href="auth-theme.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="auth-config.js"></script>
</head>

<body>
<div class="auth-card">

  <!-- LEFT DESIGN -->
  <div class="auth-left">
    <div class="brand-box">
      <img src="republic-of-the-philippines-social-security-system-logo-png_seeklogo.png" alt="SSS Logo">
      <h1>EASTWOOD BRANCH</h1>
      <p>e-RepCard</p>
    </div>
  </div>

  <!-- RIGHT FORM -->
  <div class="auth-right">
    <img class="small-logo" src="republic-of-the-philippines-social-security-system-logo-png_seeklogo.png" alt="SSS Logo">

    <h2>Create Account</h2>
    <p class="auth-subtitle">Register to submit your application</p>

    <div class="auth-group">
      <label>Full Name</label>
      <input id="fullName" type="text" placeholder="Enter your full name">
    </div>

    <div class="auth-group">
      <label>Email Address</label>
      <input id="email" type="email" placeholder="you@example.com">
    </div>

    <div class="auth-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="Enter your password">
    </div>

    <div class="auth-group">
      <label>Confirm Password</label>
      <input id="confirmPassword" type="password" placeholder="Confirm your password">
    </div>

    <button class="auth-btn" onclick="registerUser()">Create Account</button>

    <div id="message" class="message"></div>

    <div class="auth-links">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

</div>

<script src="auth.js"></script>
</body>
</html>
